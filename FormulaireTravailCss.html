<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Informatique - Sénégal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Support Informatique</h1>
        <div style="font-size: 2rem; color: #00853f;">★</div>
        <p>Demande d’assistance technique</p>
    </header>

    <main>
        <section>
            <h2>Problèmes fréquents</h2>
            <ul>
                <li>Ordinateur lent</li>
                <li>Connexion Internet</li>
                <li>Mot de passe oublié</li>
            </ul>
        </section>

        <section>
            <h2>Formulaire de contact</h2>
            <form>
                <label>Nom :</label>
                <input type="text" placeholder="Votre nom">
                
                <label>Email :</label>
                <input type="email" placeholder="Votre email">
                
                <label>Problème :</label>
                <select>
                    <option>Ordinateur lent</option>
                    <option>Internet</option>
                    <option>Mot de passe</option>
                </select>
                
                <label>Message :</label>
                <textarea placeholder="Décrivez votre problème"></textarea>
                
                <button type="submit">Envoyer la demande</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Service informatique - Lion de la Téranga 🇸🇳</p>
    </footer>

</body>
</html>
